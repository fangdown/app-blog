<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .t1{
      height: 100px;
      display: none;
    }
    .t2{
      height: 100px;
      visibility: hidden;
    }
    .t3{
      height: 100px;
      opacity: 0;
    }
    .t4{
      height: 100px;
      position: absolute;
      top: -9999px;
      left: -9999px;
    }
    .t5{
      height: 0;
      width: 0;
    }
    .t6{
      height: 100px;
      clip-path: polygon(0px 0px,0px 0px,0px 0px,0px 0px);
    }
    .ele{
      height: 100px;
      background-color: green;
    }
  </style>
</head>
<body>
  <div style="font-size:2em">111</div>
  <div class="t1"></div>
  <div class="t2"></div>
  <div class="t3"></div>
  <div class="t4"></div>
  <div class="t5"></div>
  <div class="t6"></div>
  <div class="ele">hello</div>
</body
</html>
