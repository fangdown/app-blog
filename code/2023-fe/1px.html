<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .box {
        width: 200px;
        height: 200px;
      }
      .box-shadow-1px {
        box-shadow: 0px -1px 0px 0px rgba(0, 0, 0, 1);
      }
      .scale-1px {
        position: relative;
      }
      .scale-1px::after {
        content: "";
        position: absolute;
        bottom: 0;
        background: #000;
        width: 100%;
        height: 1px;
        -webkit-transform: scaleY(0.5);
        transform: scaleY(0.5);
        -webkit-transform-origin: 0 0;
        transform-origin: 0 0;
      }
    </style>
  </head>
  <body>
    <div class="box box-shadow-1px">1</div>
    <div class="box scale-1px">2</div>
  </body>
</html>
