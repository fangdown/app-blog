<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>CSP Example</title>
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'"
    />
  </head>
  <body>
    <h1>CSP Example</h1>
    <p>Hello, world!</p>
    <script>
      alert("Hello, world!");
    </script>
  </body>
</html>
