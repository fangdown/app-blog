<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/antd@4.21.2/lib/index.min.js"></script>
    <title>Document</title>
    <style>
        .root{
            display: flex;
            flex-grow: 1;
            align-items: center;
            flex-flow: row wrap;
            padding: 20px 0;
            margin-right: 125px;
        }
        .responseRow {
            display: flex;
            justify-content: space-between;
            flex-grow: 1;
            margin: -8px 0 0 -8px;
        }
        .responseRow .l1 {
            display: flex;
            align-items: center;
            margin: 8px 0 0 8px;
        }
        .responseRow .l2 {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            margin: 8px 0 0 8px;
        }

    </style>
</head>
<body>
    <div class="root">
        <Row class="responseRow">
            <Col class="l1">左侧左侧操作左侧左侧左侧操作左侧左侧左侧操作左侧</Col>
            <Col class="l2">右侧右侧</Col>
        </Row>
    </div>
   
</body>
</html>
