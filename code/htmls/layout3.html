<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <style>
    .left,
    .right,
    .middle {
        height: 100px;
    }
    .box1{
      display: flex;
    }
    .box1 .left{
      width: 200px;
      background-color: green;
    }
    .box1 .middle{
      flex: 1;
      background-color:azure
    }
    .box1 .right{
      width: 200px;
      background-color:burlywood;
    }
  </style>
  <div class="box1">
    <div class="left"></div>
    <div class="middle"></div>
    <div class="right"></div>
  </div>
  <p style="height: 10px;"></p>
  <style>
  .box2{
    overflow: hidden;
  }
  .box2 .left{
    width: 200px;
    float: left;
    background-color: green;
  }
  .box2 .middle{
    width: 100%;
    background-color:azure;
    margin:0 200px 0 200px;
  }
  .box2 .right{
    width: 200px;
    float: right;
    background-color:burlywood;
  }
</style>
<div class="box2">
  <div class="left"></div>
  <div class="right"></div>
  <div class="middle"></div>
</div>
<p style="height: 10px;"></p>
<style>
  .box3{
    overflow: hidden;
    position: relative;
  }
  .box3 .left{
    width: 200px;
    background-color: green;
    position: absolute;
    left: 0;
    top: 0;
  }
  .box3 .middle{
    width: 100%;
    background-color:azure;
    margin:0 200px;
  }
  .box3 .right{
    width: 200px;
    background-color:burlywood;
    position: absolute;
    right: 0;
    top: 0;
  }
</style>
<div class="box3">
  <div class="left"></div>
  <div class="middle"></div>
  <div class="right"></div>
</div>
<p style="height: 10px;"></p>

<style>
  .box4{
    overflow: hidden;
    /* display: table; */
  }
  .box4 .left{
    width: 200px;
    background-color: green;
    display: table-cell;
  }
  .box4 .middle{
    width: 500px;
    background-color:azure;
    display: table-cell;
  }
  .box4 .right{
    width: 200px;
    background-color:burlywood;
    display: table-cell;
  }
</style>
<div class="box4">
  <div class="left"></div>
  <div class="middle"></div>
  <div class="right"></div>
</div>
</body>
</html>
