<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      #text-box {
        border: 1px solid;
        width: 500px;
        height: 500px;
      }
    </style>
  </head>
  <body>
    <div id="text-box"></div>
    <script>
      function typeText(text, element, delay) {
        for (let i = 0; i < text.length; i++) {
          setTimeout(() => {
            element.textContent += text[i];
          }, i * delay);
        }
      }

      // 调用示例
      const message = "这是一条打字机效果的消息";
      const textElement = document.querySelector("#text-box");
      typeText(message, textElement, 100); // 每隔100毫秒添加一个字符
    </script>
  </body>
</html>
